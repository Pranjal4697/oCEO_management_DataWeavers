<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <script>
        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('open');
        }
    </script>
<style>
    table {
        width: 100%;
        border-collapse: collapse;
    }
    th, td {
        border: 1px solid #ddd;
        padding: 8px;
        text-align: left;
    }
    th {
        background-color: #4CAF50;
        color: white;
    }
    .apply-job {
        background-color: #4CAF50;
        color: white;
        border: none;
        padding: 10px 20px;
        text-decoration: none;
        display: inline-block;
        margin-top: 20px;
    }
    .sidebar {
        background-color: #333;
        color: white;
        width: 200px;
        height: 100vh;
        position: fixed;
        line-height: 30px;
        padding: 20px;
        left: -300px;
        transition: left 0.3s ease;
    }
    .sidebar.open {
        left: 2px;
    }
    .menu-icon {
        cursor: pointer;
        display: block;
        width: 30px;
        height: 20px;
        position: absolute;
        top: 10px;
        left: 10px;
    }
    .menu-icon span {
        display: block;
        width: 100%;
        height: 4px;
        background-color: #333;
        margin: 5px 0;
    }
    a{
        color: white;
        text-decoration: none;
    }
</style>
</head>
<body>
<h1 style="padding-top: 50px; text-align:center; border: 1px #e9e9e9;" >Update Email Address !</h1>
<div class="menu-icon" onclick="toggleMenu()">
    <span></span>
    <span></span>
    <span></span>
</div>
<div id="sidebar" class="sidebar">
    <h2>Dashboard</h2>
    <a href="/{{type}}/after_login_other">Home Page</a><br>
    <a href="/{{type}}/jobs_approved">Approved Jobs</a><br>
    {% if type == 'sa_js' %}
    <a href="/{{type}}/timecard_for_payment">Time Card for Review</a><br>
    {% endif %}
    <a href="/{{type}}/logout">Logout</a><br>

</div>
<body>
        
        <h1>Change Email</h1>
    
        <form action="/admin/others/others_email_change/{{user_type}}" method="post">
            <label for="email">New Email</label>
            <input type="text" name="email" id="email" required>
            <input type="submit" value="Change Email">
        </form>

</body>
</html>
